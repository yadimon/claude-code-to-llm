name: Publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish manually
        required: true
        type: choice
        options:
          - claude-code-to-llm
          - claude-code-to-llm-server
  push:
    tags:
      - "claude-code-to-llm-v*"
      - "claude-code-to-llm-server-v*"

env:
  NPM_CONFIG_PROVENANCE: true

jobs:
  publish-core:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.package == 'claude-code-to-llm' || startsWith(github.ref_name, 'claude-code-to-llm-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify tag matches core package version
        if: github.event_name == 'push'
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./packages/claude-code-to-llm/package.json').version")"
          if [ "claude-code-to-llm-v${PACKAGE_VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match packages/claude-code-to-llm/package.json version claude-code-to-llm-v${PACKAGE_VERSION}" >&2
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test core package
        run: npm run test --workspace @yadimon/claude-code-to-llm

      - name: Test server package
        run: npm run test --workspace @yadimon/claude-code-to-llm-server

      - name: Core e2e
        run: npm run e2e --workspace @yadimon/claude-code-to-llm

      - name: Server e2e
        run: npm run e2e --workspace @yadimon/claude-code-to-llm-server

      - name: Build
        run: npm run build

      - name: Pack core package
        run: npm run pack --workspace @yadimon/claude-code-to-llm

      - name: Publish core package dry run
        run: npm run publish:dry-run --workspace @yadimon/claude-code-to-llm

      - name: Publish core package to npm with Trusted Publishing
        run: npm publish --workspace @yadimon/claude-code-to-llm

  publish-server:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.package == 'claude-code-to-llm-server' || startsWith(github.ref_name, 'claude-code-to-llm-server-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify tag matches server package version
        if: github.event_name == 'push'
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./packages/claude-code-to-llm-server/package.json').version")"
          if [ "claude-code-to-llm-server-v${PACKAGE_VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match packages/claude-code-to-llm-server/package.json version claude-code-to-llm-server-v${PACKAGE_VERSION}" >&2
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test core package
        run: npm run test --workspace @yadimon/claude-code-to-llm

      - name: Test server package
        run: npm run test --workspace @yadimon/claude-code-to-llm-server

      - name: Core e2e
        run: npm run e2e --workspace @yadimon/claude-code-to-llm

      - name: Server e2e
        run: npm run e2e --workspace @yadimon/claude-code-to-llm-server

      - name: Build
        run: npm run build

      - name: Pack server package
        run: npm run pack --workspace @yadimon/claude-code-to-llm-server

      - name: Publish server package dry run
        run: npm run publish:dry-run --workspace @yadimon/claude-code-to-llm-server

      - name: Publish server package to npm with Trusted Publishing
        run: npm publish --workspace @yadimon/claude-code-to-llm-server
